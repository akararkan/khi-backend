spring:
  application:
    name: khi_backend

  # ===============================
  # DATASOURCE (PostgreSQL)
  # ===============================
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}

  # ===============================
  # JPA / HIBERNATE
  # ===============================
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # ===============================
  # WEB MVC
  # ===============================
  mvc:
    format:
      date: yyyy-MM-dd
      date-time: yyyy-MM-dd HH:mm:ss

  # ===============================
  # JACKSON (JSON)
  # ===============================
  jackson:
    serialization:
      indent_output: true
    default-property-inclusion: non_null
    time-zone: Asia/Baghdad

  # ===============================
  # DEVTOOLS
  # ===============================
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  # ===============================
  # MULTIPART UPLOAD LIMITS
  # ===============================
  servlet:
    multipart:
      enabled: true
      max-file-size: 1GB
      max-request-size: 1GB
      file-size-threshold: 2MB

  # ===============================
  # REDIS CACHE CONFIGURATION
  # ===============================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes default TTL
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "khi:"


# ===============================
# OPENAPI / SWAGGER (springdoc-openapi)
# ===============================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true
    deep-linking: true
    display-request-duration: true
    persist-authorization: true       # remembers Bearer token across page reloads
    doc-expansion: none               # collapsed by default — cleaner with this many endpoints
    show-extensions: true
    show-common-extensions: true
  default-produces-media-type: application/json
  packages-to-scan: ak.dev.khi_backend
  paths-to-match: /api/**
  show-actuator: false

# ===============================
# JWT (ENV SECRET ONLY)
# ===============================
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}
  cookie-name: ${JWT_COOKIE_NAME}
  cookie-secure: ${JWT_COOKIE_SECURE}  # Set to true in production (HTTPS)
  cookie-http-only: ${JWT_COOKIE_HTTP_ONLY}
  cookie-same-site: ${JWT_COOKIE_SAME_SITE}
  cookie-path: ${JWT_COOKIE_PATH}
  cookie-max-age: ${JWT_COOKIE_MAX_AGE}  # 24 hours in seconds

# ===============================
# APP CUSTOM CONFIG
# ===============================
app:
  cors:
    allowed-origins: https://khi-frontend.vercel.app,https://khi-frontend-*.vercel.app,http://localhost:5173,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# ===============================
# AWS S3
# ===============================
aws:
  s3:
    region: us-east-1
    bucket: s3-khiwebsite
    base-folder: khi-web-folders

# ===============================
# SERVER / TOMCAT LIMITS
# ===============================
server:
  forward-headers-strategy: framework
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

  tomcat:
    max-swallow-size: 1GB
    max-http-form-post-size: 1GB
    max-parameter-count: 10000

  # ===============================
  # SERVER COOKIE CONFIGURATION
  # ===============================
  servlet:
    session:
      cookie:
        name: KHI_SESSION
        http-only: true
        secure: true          # HTTPS on Railway
        same-site: Lax        # Allows cookie on OAuth2 redirects
        path: /
        max-age: 86400  # 24 hours

# ===============================
# LOGGING
# ===============================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

  level:
    root: WARN
    ak.dev.khi_backend: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.springframework.web.servlet: WARN
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
    org.springframework.cache: WARN
    org.springframework.jdbc: WARN