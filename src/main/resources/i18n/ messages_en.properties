# ===== User / Auth =====
error.user.already_exists=Username or email is already registered.
error.user.bad_credentials=Invalid username or password. Please double-check and try again.
error.user.locked=Your account is temporarily locked for security reasons. Please wait and try again later, or use 'Forgot password' to regain access.
error.user.not_found=No account found with that username or email. Please check your details or register.
error.user.access_denied=You do not have permission to access this resource. Contact an administrator if you believe this is a mistake.

# ===== HTTP =====
error.http.method_not_allowed=The HTTP method used is not supported for this endpoint. Please check the API documentation.
error.http.unreadable_body=The request body is missing or contains invalid JSON. Check the Content-Type header and body format.
error.http.missing_param=A required request parameter is missing. Please include it in your request URL.
error.http.payload_too_large=The uploaded file exceeds the maximum allowed size of 5 MB. Please compress or resize your file.
error.http.multipart=The multipart request is malformed or is missing required file parts.

