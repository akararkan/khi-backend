spring:
  datasource:
    url: jdbc:h2:mem:khi_backend_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false

jwt:
  secret: test-only-secret-key-that-is-long-enough-for-hmac-signing
  expiration-ms: 86400000
  cookie-name: khi_test_auth
  cookie-secure: false
  cookie-http-only: true
  cookie-same-site: Lax
  cookie-path: /
  cookie-max-age: 86400

app:
  cors:
    allowed-origins: http://localhost:3000
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

aws:
  s3:
    region: us-east-1
    bucket: test-bucket
    base-folder: test

logging:
  level:
    root: WARN
    ak.dev.khi_backend: INFO
